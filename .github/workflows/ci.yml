name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: make repo-check

  go-quality:
    name: Go Quality Gates
    runs-on: ubuntu-latest
    if: ${{ hashFiles('go.mod') != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l $(find . -name '*.go' -type f))"

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -count=1

      - name: Run race tests
        run: go test ./... -race -count=1
